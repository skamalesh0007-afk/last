apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-portfolio
  template:
    metadata:
      labels:
        app: student-portfolio
    spec:
      containers:
      - name: student-portfolio
        image: kamalesh.s2023@vitstudent.ac.in/student-portfolio:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: student-portfolio-service
spec:
  type: NodePort
  selector:
    app: student-portfolio
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30020
